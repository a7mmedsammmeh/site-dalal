<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="دلال — تفاصيل المنتج">
    <meta name="theme-color" content="#0D0D0D">
    <title>دلال — المنتج</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Poppins:wght@300;400;500;600&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/dalal-logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="lang-ar">

    <!-- HEADER -->
    <header id="header" class="header">
        <nav class="navbar">
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html"           class="nav-link" id="navLinkHomeP">الرئيسية</a></li>
                <li><a href="products.html"        class="nav-link" id="navLinkCollectionP">تشكيلة دلال</a></li>
                <li><a href="index.html#why-dalal" class="nav-link" id="navLinkWhyDalalP">لماذا دلال</a></li>
                <li><a href="index.html#footer"    class="nav-link" id="navLinkContactP">تواصل معنا</a></li>
            </ul>

            <div class="nav-controls">
                <div class="nav-controls-icons">
                    <a href="https://www.facebook.com/dalal.lingerie/" target="_blank" rel="noopener noreferrer" class="nav-icon-btn" aria-label="Facebook">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>

                        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                    </a>
                    <button class="lang-toggle" aria-label="Switch language">EN</button>
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">

                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">

                </div>
                <button class="nav-toggle" id="navToggle" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>
    </header>

    <!-- PRODUCT DETAIL -->
    <main class="product-detail-page" id="productDetail">
        <div class="product-detail-grid">

            <!-- LEFT: Images -->
            <div class="product-gallery">
                <div class="main-image-wrapper">
                    <img id="mainImage" src="" alt="" class="main-image">
                </div>
                <div class="thumbs-container" id="thumbsContainer"></div>
            </div>

            <!-- RIGHT: Info -->
            <div class="product-info-panel">
                <a href="products.html" class="back-link" id="backToProducts">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    العودة لتشكيلة دلال
                </a>

                <h1 class="product-detail-name" id="productName">...</h1>

                <p class="product-description" id="productDescription"></p>

                <div class="pricing-box">
                    <h3 class="pricing-title" id="pricingTitle">الأسعار</h3>
                    <div class="pricing-divider"></div>
                    <ul class="pricing-list" id="pricingList">
                        <!-- Populated dynamically from products.json -->
                    </ul>
                </div>

                <button class="btn btn-primary btn-order-main" id="orderBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 2C6.477 2 2 6.145 2 11.243c0 2.907 1.434 5.503 3.678 7.199V22l3.38-1.853c.9.25 1.855.384 2.842.384h.1c5.523 0 10-4.145 10-9.243S17.523 2 12 2zm1.076 12.457l-2.55-2.72-4.98 2.72 5.474-5.81 2.613 2.72 4.916-2.72-5.473 5.81z"/></svg>
                    اطلبي الآن عبر ماسنجر
                </button>
            </div>
        </div>
    </main>

    <!-- ORDER MODAL -->
    <div class="modal-overlay" id="orderModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal">
            <button class="modal-close" id="modalClose" aria-label="إغلاق">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>

            <h2 class="modal-title" id="modalTitle">تفاصيل الطلب</h2>
            <div class="modal-divider"></div>

            <!-- Step 1: Quantity -->
            <div class="modal-step" id="modalStep1">
                <p class="modal-label" id="modalQtyLabel">اختاري الكمية</p>
                <div class="modal-options" id="modalQtyOptions">
                    <!-- populated from pricing data -->
                </div>
            </div>

            <!-- Step 2: Size -->
            <div class="modal-step" id="modalStep2">
                <p class="modal-label" id="modalSizeLabel">اختاري المقاس</p>
                <div class="modal-options modal-options-inline" id="modalSizeOptions">
                    <!-- populated dynamically -->
                </div>
            </div>

            <!-- Step 3: Color -->
            <div class="modal-step" id="modalStep3">
                <label class="modal-label" for="modalColorInput" id="modalColorLabel">اللون المطلوب</label>
                <input type="text" id="modalColorInput" class="modal-input" placeholder="مثال: أبيض، أسود، بيج...">
            </div>

            <!-- Step 3: Notes (optional) -->
            <div class="modal-step" id="modalStep3">
                <label class="modal-label" for="modalNotesInput" id="modalNotesLabel">ملاحظات إضافية <span class="modal-optional">(اختياري)</span></label>
                <input type="text" id="modalNotesInput" class="modal-input" placeholder="أي تفاصيل إضافية...">
            </div>

            <button class="btn btn-primary modal-submit" id="modalSubmit">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 2C6.477 2 2 6.145 2 11.243c0 2.907 1.434 5.503 3.678 7.199V22l3.38-1.853c.9.25 1.855.384 2.842.384h.1c5.523 0 10-4.145 10-9.243S17.523 2 12 2zm1.076 12.457l-2.55-2.72-4.98 2.72 5.474-5.81 2.613 2.72 4.916-2.72-5.473 5.81z"/></svg>
                أرسلي طلبك عبر ماسنجر
            </button>
        </div>
    </div>

    <!-- FOOTER MINIMAL -->
    <footer class="footer footer-minimal">
        <div class="footer-divider"></div>
        <div class="footer-bottom">
            <p id="footerRights">© 2026 دلال. جميع الحقوق محفوظة.</p>
            <p class="footer-credit" id="footerCraft">صُنع بأناقة</p>
        </div>
    </footer>


    <script src="i18n.js"></script>
    <script src="products-data.js"></script>
    <script src="script.js"></script>
    <script src="product.js"></script>
</body>
</html>
