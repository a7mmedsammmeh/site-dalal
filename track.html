<style>
.track-page {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 7rem 1.5rem 4rem;
    width: 100%;
}

.track-header {
    text-align: center;
    margin-bottom: 2.5rem;
}

.track-logo {
    font-family: var(--font-en);
    font-size: 1.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 0.5rem;
}

.track-title {
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    color: var(--text);
    letter-spacing: 0.06em;
    margin-bottom: 0.5rem;
}

.track-subtitle {
    font-size: 0.88rem;
    color: var(--text-muted);
}

.track-form-box {
    width: 100%;
    max-width: 440px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 2rem 1.75rem;
    margin-bottom: 2rem;
}

.track-input-wrap {
    display: flex;
    gap: 0.6rem;
    align-items: stretch;
}

.track-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.8rem 1rem;
    outline: none;
    transition: border-color 0.25s;
    direction: ltr;
    text-align: center;
    letter-spacing: 0.05em;
}
.track-input::placeholder { color: var(--text-dim); direction: rtl; text-align: center; }
.track-input:focus { border-color: var(--gold-dim); }

.track-btn {
    background: var(--gold);
    color: var(--bg);
    border: 1px solid var(--gold);
    border-radius: var(--r);
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 0.8rem 1.2rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.3s, color 0.3s;
    letter-spacing: 0.06em;
}
.track-btn:hover { background: transparent; color: var(--gold); }
.track-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* Results */
.track-results {
    width: 100%;
    max-width: 540px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.track-empty {
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-size: 0.9rem;
}

/* Order card */
.track-order-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    animation: fadeUp 0.35s ease forwards;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
}

.track-order-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg-light);
}

.track-order-date {
    font-size: 0.78rem;
    color: var(--text-dim);
}

/* Status badge */
.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    letter-spacing: 0.04em;
}
.status-badge.pending   { background: rgba(224,192,151,0.12); color: var(--gold); border: 1px solid rgba(224,192,151,0.3); }
.status-badge.confirmed { background: rgba(76,175,125,0.12);  color: #4caf7d;     border: 1px solid rgba(76,175,125,0.3); }
.status-badge.shipped   { background: rgba(91,155,213,0.12);  color: #5b9bd5;     border: 1px solid rgba(91,155,213,0.3); }
.status-badge.cancelled { background: rgba(224,92,92,0.12);   color: #e05c5c;     border: 1px solid rgba(224,92,92,0.3); }

/* Progress bar */
.track-progress {
    display: flex;
    align-items: center;
    padding: 1.25rem 1.5rem;
    gap: 0;
    border-bottom: 1px solid var(--border);
}

.progress-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    flex: 1;
    position: relative;
}

.progress-step::before {
    content: '';
    position: absolute;
    top: 14px;
    inset-inline-end: 50%;
    width: 100%;
    height: 2px;
    background: var(--border);
    z-index: 0;
}
.progress-step:first-child::before { display: none; }

.progress-step.done::before  { background: var(--gold); }
.progress-step.active::before { background: linear-gradient(to right, var(--gold), var(--border)); }

.progress-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg-card);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    color: var(--text-dim);
    position: relative;
    z-index: 1;
    transition: all 0.3s ease;
}
.progress-step.done   .progress-dot { border-color: var(--gold); background: var(--gold); color: var(--bg); }
.progress-step.active .progress-dot { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 0 4px rgba(224,192,151,0.15); }

.progress-label {
    font-size: 0.68rem;
    color: var(--text-dim);
    text-align: center;
    white-space: nowrap;
}
.progress-step.done   .progress-label { color: var(--gold); }
.progress-step.active .progress-label { color: var(--text-muted); }

/* Order body */
.track-order-body {
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
}

.track-order-row {
    display: flex;
    gap: 0.5rem;
    font-size: 0.83rem;
}
.track-order-label { color: var(--text-muted); min-width: 80px; flex-shrink: 0; }
.track-order-val   { color: var(--text); }

.track-product-item {
    font-size: 0.8rem;
    color: var(--text-muted);
    background: var(--bg-light);
    border-radius: var(--r);
    padding: 0.2rem 0.6rem;
    display: inline-block;
    margin: 0.1rem 0;
}

.track-order-total {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--gold);
}

/* Spinner */
.track-spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 2rem auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.track-error {
    text-align: center;
    color: #e05c5c;
    font-size: 0.85rem;
    padding: 1rem;
}

/* cancel btn */
.oc-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em;
    padding: 0.55rem 0.75rem; border-radius: var(--r);
    border: 1px solid var(--border); color: var(--text-muted);
    background: transparent; cursor: pointer; font-family: inherit;
    transition: all 0.25s ease;
}
.oc-btn.cancel-btn { color: #e05c5c; border-color: rgba(224,92,92,0.3); }
.oc-btn.cancel-btn:hover { background: rgba(224,92,92,0.08); border-color: #e05c5c; }

/* search responsive */
@media (max-width: 600px) {
    .track-input-wrap { flex-direction: column; }
    .track-input-wrap input,
    .track-input-wrap button { width: 100%; }
}
</style>

<script>
(function () {

    const STATUS_AR = {
        pending:   { label: 'قيد المراجعة',   icon: '⏳', hint: 'طلبك وصلنا وبنراجعه دلوقتي ✨' },
        confirmed: { label: 'تم التأكيد',      icon: '✓',  hint: 'تم تأكيد طلبك وجاري التجهيز 🎀' },
        shipped:   { label: 'في الطريق إليكِ', icon: '🚚', hint: 'طلبك في الطريق إليكِ، استعدي! 🚚' },
        delivered: { label: 'تم التسليم',      icon: '✓',  hint: 'وصل طلبك بالسلامة 💚' },
        cancelled: { label: 'ملغي',            icon: '✕',  hint: 'تم إلغاء هذا الطلب' }
    };
    const STATUS_EN = {
        pending:   { label: 'Under Review', icon: '⏳', hint: 'We received your order and are reviewing it ✨' },
        confirmed: { label: 'Confirmed',    icon: '✓',  hint: 'Your order is confirmed and being prepared 🎀' },
        shipped:   { label: 'On the Way',   icon: '🚚', hint: 'Your order is on its way, get ready! 🚚' },
        delivered: { label: 'Delivered',    icon: '✓',  hint: 'Your order has been delivered 💚' },
        cancelled: { label: 'Cancelled',    icon: '✕',  hint: 'This order has been cancelled' }
    };

    const STEPS_AR = ['قيد المراجعة', 'تم التأكيد', 'في الطريق', 'تم التسليم'];
    const STEPS_EN = ['Under Review',  'Confirmed',  'Shipped',   'Delivered'];
    const STEP_MAP = { pending: 0, confirmed: 1, shipped: 2, delivered: 3 };

    window.searchByRef = async function () {
        const raw = document.getElementById('trackRef').value.trim().toUpperCase();
        if (!raw) return;

        const btn     = document.getElementById('trackSearchBtn');
        const results = document.getElementById('trackResults');
        btn.disabled  = true;
        results.innerHTML = '<div class="track-spinner"></div>';

        try {
            const order = await fetchOrderByRef(raw);
            results.innerHTML = renderOrderCard(order);
        } catch (err) {
            const lang = localStorage.getItem('dalal-lang') || 'ar';
            results.innerHTML = `<div class="track-empty">${lang === 'ar' ? 'لم يتم العثور على هذا الطلب' : 'Order not found'}</div>`;
        }

        btn.disabled = false;
    };

    function renderOrderCard(order) {
        const lang   = localStorage.getItem('dalal-lang') || 'ar';
        const isAr   = lang === 'ar';
        const fromRef = new URLSearchParams(window.location.search).get('ref');
        const backHTML = fromRef ? `
            <a href="orders.html" id="backToOrdersLabel" class="back-link"
               style="display:inline-flex;align-items:center;gap:0.5rem;margin-top:1.2rem;font-size:0.82rem;letter-spacing:0.06em;color:var(--text-muted);transition:color 0.3s;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                    <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
                </svg>
                ${isAr ? 'الرجوع للطلبات' : 'Back to Orders'}
            </a>` : '';
        const STATUS = lang === 'ar' ? STATUS_AR : STATUS_EN;
        const STEPS  = lang === 'ar' ? STEPS_AR  : STEPS_EN;
        const status = order.status || 'pending';
        const s      = STATUS[status] || STATUS.pending;
        const stepIdx = STEP_MAP[status] ?? 0;
        const isCancelled = status === 'cancelled';

        const products = Array.isArray(order.products)
            ? order.products
            : (typeof order.products === 'string' ? JSON.parse(order.products) : []);

        const productsHTML = products.map(p => {
            const details = [p.offer, p.size, p.color].filter(Boolean).join(' · ');
            return `<span class="track-product-item"><strong>${esc(p.name)}</strong>${details ? ' — ' + esc(details) : ''}</span>`;
        }).join('');

        const stepsHTML = isCancelled
            ? `<div style="padding:1rem 1.25rem;text-align:center;color:#e05c5c;font-size:0.85rem;border-bottom:1px solid var(--border)">
                ${lang === 'ar' ? 'تم إلغاء هذا الطلب' : 'This order has been cancelled'}
               </div>`
            : `${status === 'delivered' ? `<div style="padding:0.85rem 1.25rem;background:rgba(76,175,125,0.08);border:1px solid rgba(76,175,125,0.25);border-left:0;border-right:0;display:flex;align-items:center;gap:0.6rem;font-size:0.82rem;color:#2d9e5f;">
                <span style="font-size:1.2rem">🌸</span>
                <span>${lang === 'ar' ? 'سعدنا بخدمتك! نتمنى أن تكوني راضية تماماً عن طلبك. يشرفنا دائماً استقبال طلباتك' : 'Thank you for your order! We hope you love it. It\'s always a pleasure serving you'}</span>
               </div>` : ''}
               <div class="track-progress">
                ${STEPS.map((label, i) => {
                    const isDone = status === 'delivered' ? true : i <= stepIdx;
                    const cls  = isDone ? 'done' : i === stepIdx + 1 ? 'active' : '';
                    const icon = isDone ? '✓' : (i + 1);
                    return `<div class="progress-step ${cls}">
                        <div class="progress-dot">${icon}</div>
                        <div class="progress-label">${label}</div>
                    </div>`;
                }).join('')}
               </div>`;

        const date = order.created_at
            ? new Date(order.created_at).toLocaleDateString(lang === 'ar' ? 'ar-EG' : 'en-US', { day:'2-digit', month:'short', year:'numeric' })
            : '—';

        const ref = order.order_ref || '—';

        return `
        <div class="track-order-card">
            <div class="track-order-header">
                <div>
                    <div style="font-family:'Poppins',monospace;font-size:0.88rem;font-weight:600;color:var(--gold);letter-spacing:0.08em">${esc(ref)}</div>
                    <div class="track-order-date">${date}</div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.2rem;">
                    <span class="status-badge ${status}">${s.icon} ${s.label}</span>
                    <span style="font-size:0.72rem;color:var(--text-dim);text-align:end;">${s.hint}</span>
                </div>
            </div>
            ${stepsHTML}
            <div class="track-order-body">
                <div class="track-order-row">
                    <span class="track-order-label">${lang === 'ar' ? 'المنتجات' : 'Products'}</span>
                    <span class="track-order-val" style="display:flex;flex-direction:column;gap:0.3rem">${productsHTML || '—'}</span>
                </div>
                <div class="track-order-row">
                    <span class="track-order-label">${lang === 'ar' ? 'الإجمالي' : 'Total'}</span>
                    <span class="track-order-total">${order.total ? order.total.toLocaleString() + (lang === 'ar' ? ' جنيه' : ' EGP') : '—'}</span>
                </div>
            </div>

        </div>
        ${backHTML}`;
    }

    function esc(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* Enter key */
    document.getElementById('trackRef').addEventListener('keydown', e => {
        if (e.key === 'Enter') searchByRef();
    });

    /* Auto-uppercase while typing */
    document.getElementById('trackRef').addEventListener('input', function () {
        const pos = this.selectionStart;
        this.value = this.value.toUpperCase();
        this.setSelectionRange(pos, pos);
    });

    // Re-render results on language change
    document.querySelectorAll('.lang-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
            setTimeout(() => {
                const ref = document.getElementById('trackRef').value.trim();
                if (ref) searchByRef();
                const searchLbl = document.getElementById('trackSearchLabel');
                if (searchLbl) searchLbl.textContent = localStorage.getItem('dalal-lang') === 'en' ? 'Search' : 'بحث';
            }, 150);
        });
    });

    /* Auto-search from URL ?ref=DL-XXXXX */
    const urlRef = new URLSearchParams(window.location.search).get('ref');

    // Apply saved language on load
    if (typeof applyLanguage === 'function') {
        applyLanguage(localStorage.getItem('dalal-lang') || 'ar');
    }
    // Apply track help label translation
    const applyTrackHelp = () => {
        const lang = localStorage.getItem('dalal-lang') || 'ar';
        const t = DALAL_I18N[lang];
        const lbl = document.getElementById('trackHelpLabel');
        if (lbl) lbl.textContent = t.trackHelpLabel;
    };
    applyTrackHelp();
    document.addEventListener('dalal-lang-change', applyTrackHelp);
    // Set search button label
    const searchLbl = document.getElementById('trackSearchLabel');
    if (searchLbl) searchLbl.textContent = localStorage.getItem('dalal-lang') === 'en' ? 'Search' : 'بحث';
    if (urlRef) {
        document.getElementById('trackRef').value = urlRef.toUpperCase();
        searchByRef();
    }

    function showTrackHelp(btn) {
        const lang = localStorage.getItem('dalal-lang') || 'ar';
        const t = DALAL_I18N[lang];
        showHelpPopover(btn, t.trackHelpBody, t.trackHelpTitle);
    }
    window.showTrackHelp = showTrackHelp;

    window.cancelOrderFromTrack = async function(ref) {
        const lang = localStorage.getItem('dalal-lang') || 'ar';
        const msg  = lang === 'ar' ? 'هل أنت متأكدة من إلغاء هذا الطلب؟' : 'Are you sure you want to cancel this order?';
        if (!confirm(msg)) return;
        try {
            const db = await getSupabase();
            const { error } = await db.from('orders').update({ status: 'cancelled' }).eq('order_ref', ref);
            if (error) throw error;
            // update localStorage
            const orders = getLocalOrders();
            const o = orders.find(x => x.ref === ref);
            if (o) { o.status = 'cancelled'; localStorage.setItem('dalal-my-orders', JSON.stringify(orders)); }
            // re-search to refresh the card
            searchByRef();
        } catch {
            alert(lang === 'ar' ? 'حدث خطأ، يرجى المحاولة مرة أخرى' : 'Something went wrong');
        }
    };

})();
</script>
</body>
</html>
