<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نقل المنتجات إلى Supabase</title>
<style>
body { font-family: 'Tajawal', sans-serif; background: #0D0D0D; color: #F5F0EB; padding: 2rem; max-width: 800px; margin: 0 auto; }
.log { background: #1A1A1A; border: 1px solid rgba(224,192,151,0.15); border-radius: 8px; padding: 1rem; margin: 1rem 0; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; }
.log-item { padding: 0.25rem 0; border-bottom: 1px solid rgba(224,192,151,0.05); }
.log-success { color: #4caf7d; }
.log-error { color: #e05c5c; }
.log-info { color: #5b9bd5; }
button { background: #E0C097; color: #0D0D0D; border: none; padding: 0.75rem 2rem; border-radius: 6px; font-size: 1rem; font-weight: 700; cursor: pointer; margin: 1rem 0; }
button:hover { background: #C4A67A; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
h1 { color: #E0C097; font-size: 1.8rem; margin-bottom: 1rem; }
.warning { background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.3); border-radius: 6px; padding: 1rem; margin: 1rem 0; }
</style>
</head>
<body>

<h1>🚀 نقل المنتجات من products.json إلى Supabase</h1>

<div class="warning">
    <strong>⚠️ تحذير:</strong> هذا السكريبت سينقل جميع المنتجات من products.json إلى قاعدة بيانات Supabase.
    <br>تأكد من تشغيل SQL في Supabase أولاً!
</div>

<button id="migrateBtn" onclick="migrateProducts()">ابدأ النقل</button>

<div class="log" id="logContainer"></div>

<script src="supabase.js"></script>
<script>
const SUPABASE_STORAGE_URL = 'https://wnzueymobiwecuikwcgx.supabase.co/storage/v1/object/public/products';

function log(message, type = 'info') {
    const container = document.getElementById('logContainer');
    const item = document.createElement('div');
    item.className = `log-item log-${type}`;
    item.textContent = `[${new Date().toLocaleTimeString('ar-EG')}] ${message}`;
    container.appendChild(item);
    container.scrollTop = container.scrollHeight;
}

async function migrateProducts() {
    const btn = document.getElementById('migrateBtn');
    btn.disabled = true;
    btn.textContent = 'جاري النقل...';
    
    try {
        log('بدء عملية النقل...', 'info');
        
        // Load products.json
        log('تحميل products.json...', 'info');
        const response = await fetch('products.json');
        const products = await response.json();
        log(`تم العثور على ${products.length} منتج`, 'success');
        
        // Map folder names to Supabase Storage paths
        const folderMap = {
            'images/models/4': '4',
            'images/models/5': '5',
            'images/models/6': '6',
            'images/models/7': '7',
            'images/models/77': '77',
            'images/models/8': '8'
        };
        
        for (const product of products) {
            log(`\n━━━ معالجة: ${product.name.ar} (${product.code}) ━━━`, 'info');
            
            try {
                // Get folder number from path
                const folderNum = folderMap[product.folder];
                if (!folderNum) {
                    log(`⚠️ لم يتم العثور على الفولدر: ${product.folder}`, 'error');
                    continue;
                }
                
                // Build image URLs from Supabase Storage
                // Support any image extension (png, jpg, jpeg, webp, etc.)
                const mainImageUrl = `${SUPABASE_STORAGE_URL}/${folderNum}/${product.main}`;
                const galleryUrls = product.gallery.map(img => `${SUPABASE_STORAGE_URL}/${folderNum}/${img}`);
                
                log(`الصورة الرئيسية: ${mainImageUrl}`, 'info');
                log(`صور المعرض: ${galleryUrls.length} صورة`, 'info');
                
                // Insert product
                const productData = {
                    slug: product.slug,
                    code: product.code,
                    name_ar: product.name.ar,
                    name_en: product.name.en,
                    description_ar: product.description.ar,
                    description_en: product.description.en,
                    main_image_url: mainImageUrl,
                    featured: product.featured,
                    sizes: product.sizes
                };
                
                log('إضافة المنتج إلى قاعدة البيانات...', 'info');
                const newProduct = await insertProduct(productData);
                const newId = newProduct.id;
                log(`✅ تم إضافة المنتج برقم: ${newId}`, 'success');
                
                // Insert pricing
                log('إضافة الأسعار...', 'info');
                await insertProductPricing(newId, 'ar', product.pricing.ar);
                await insertProductPricing(newId, 'en', product.pricing.en);
                log('✅ تم إضافة الأسعار', 'success');
                
                // Insert gallery images
                log('إضافة صور المعرض...', 'info');
                for (let i = 0; i < galleryUrls.length; i++) {
                    await insertProductImage(newId, galleryUrls[i], i + 1);
                }
                log(`✅ تم إضافة ${galleryUrls.length} صورة للمعرض`, 'success');
                
                // Add to product_stock (default: in stock)
                log('إضافة حالة المخزون...', 'info');
                await updateProductStock(newId, true);
                log('✅ تم تعيين المنتج كمتوفر', 'success');
                
                log(`✅✅✅ اكتمل نقل: ${product.name.ar}`, 'success');
                
            } catch (err) {
                log(`❌ خطأ في نقل ${product.name.ar}: ${err.message}`, 'error');
                console.error(err);
            }
        }
        
        log('\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'success');
        log('🎉 اكتملت عملية النقل بنجاح!', 'success');
        log('يمكنك الآن فتح الداشبورد والتحقق من المنتجات', 'success');
        
        btn.textContent = 'تم النقل بنجاح ✅';
        
    } catch (err) {
        log(`❌ خطأ عام: ${err.message}`, 'error');
        console.error(err);
        btn.disabled = false;
        btn.textContent = 'إعادة المحاولة';
    }
}
</script>

</body>
</html>
