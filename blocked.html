<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم حظر الوصول</title>
    <link rel="icon" type="image/png" href="images/dalal-logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 3rem 2rem;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .contact {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1.5rem;
        }
        .contact a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .contact a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚫</div>
        <h1>تم حظر الوصول</h1>
        <p>عذراً، تم حظر عنوان IP الخاص بك من الوصول إلى هذا الموقع.</p>
        <p>إذا كنت تعتقد أن هذا خطأ، يرجى التواصل معنا.</p>
        <div class="contact">
            <p style="margin: 0;">للاستفسار: <a href="contact.html">تواصل معنا</a></p>
        </div>
    </div>
</body>
</html>
