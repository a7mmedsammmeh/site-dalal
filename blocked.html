<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DALAL — تم حظر الوصول</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/dalal-logo.png">
    <style>
        :root {
            --bg:       #0D0D0D;
            --bg-card:  #1A1A1A;
            --bg-light: #141414;
            --gold:     #E0C097;
            --gold-dim: #C4A67A;
            --text:     #F5F0EB;
            --text-muted: #A89B8C;
            --text-dim: #6B6158;
            --border:   rgba(224,192,151,0.15);
            --red:      #e05c5c;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:16px; -webkit-font-smoothing:antialiased; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(224,192,151,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Logo */
        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
            opacity: 0.85;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(224,92,92,0.25);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(224,92,92,0.06), 0 20px 40px rgba(0,0,0,0.4);
        }

        .block-icon {
            width: 72px;
            height: 72px;
            background: rgba(224,92,92,0.1);
            border: 1px solid rgba(224,92,92,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.75rem;
        }

        .subtitle {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 0.5rem;
        }

        .reason-box {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1.1rem;
            margin: 0.5rem 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: right;
            direction: rtl;
        }
        .reason-box span { color: var(--gold); font-weight: 500; }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 1.75rem 0;
        }

        .contact-title {
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .contact-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 1rem;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.88rem;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
            direction: ltr;
            text-align: left;
        }
        .contact-link:hover { border-color: var(--gold-dim); color: var(--gold); background: rgba(224,192,151,0.04); }
        .contact-link .link-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .contact-link .link-label { flex: 1; }
        .contact-link .link-value { font-size: 0.75rem; color: var(--text-dim); }

        .fb-icon   { background: rgba(24,119,242,0.15); color: #1877f2; }
        .ig-icon   { background: rgba(225,48,108,0.15); color: #e1306c; }
        .ms-icon   { background: rgba(0,153,255,0.15);  color: #0099ff; }
        .mail-icon { background: rgba(224,192,151,0.12); color: var(--gold); }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.72rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="brand">DALAL</div>

    <div class="card">
        <!-- Block icon -->
        <div class="block-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#e05c5c" stroke-width="1.8" width="32" height="32">
                <circle cx="12" cy="12" r="10"/>
                <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
            </svg>
        </div>

        <h1>تم حظر وصولك</h1>
        <p class="subtitle" id="subtitleText">عنوان IP الخاص بك محظور من الوصول إلى هذا الموقع.</p>

        <!-- Reason only (no IP display) -->
        <div class="reason-box" id="reasonBox" style="display:none;">
            <span style="color:var(--text-dim);">السبب:</span> <span id="reasonText"></span>
        </div>

        <div class="divider"></div>

        <div class="contact-title">للاستفسار تواصل معنا</div>

        <div class="contact-links">
            <!-- Facebook -->
            <a href="https://www.facebook.com/dalal.lingerie/" target="_blank" rel="noopener" class="contact-link">
                <div class="link-icon fb-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                </div>
                <div class="link-label">
                    <div>Facebook</div>
                    <div class="link-value">facebook.com/dalal.lingerie</div>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="opacity:0.4"><polyline points="9 18 15 12 9 6"/></svg>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/dalal.lingerie1/" target="_blank" rel="noopener" class="contact-link">
                <div class="link-icon ig-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                    </svg>
                </div>
                <div class="link-label">
                    <div>Instagram</div>
                    <div class="link-value">instagram.com/dalal.lingerie1</div>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="opacity:0.4"><polyline points="9 18 15 12 9 6"/></svg>
            </a>

            <!-- Messenger -->
            <a href="https://m.me/dalal.lingerie" target="_blank" rel="noopener" class="contact-link">
                <div class="link-icon ms-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <path d="M12 2C6.477 2 2 6.145 2 11.243c0 2.907 1.434 5.503 3.678 7.199V22l3.38-1.853c.9.25 1.855.384 2.842.384h.1c5.523 0 10-4.145 10-9.243S17.523 2 12 2zm1.076 12.457l-2.55-2.72-4.98 2.72 5.474-5.81 2.613 2.72 4.916-2.72-5.473 5.81z"/>
                    </svg>
                </div>
                <div class="link-label">
                    <div>Messenger</div>
                    <div class="link-value">m.me/dalal.lingerie</div>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="opacity:0.4"><polyline points="9 18 15 12 9 6"/></svg>
            </a>

            <!-- Email -->
            <a href="mailto:info@dalalwear.shop" class="contact-link">
                <div class="link-icon mail-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <path d="M2 7l10 7 10-7"/>
                    </svg>
                </div>
                <div class="link-label">
                    <div>البريد الإلكتروني</div>
                    <div class="link-value">info@dalalwear.shop</div>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="opacity:0.4"><polyline points="9 18 15 12 9 6"/></svg>
            </a>
        </div>
    </div>

    <div class="footer-note">DALAL © 2025 — جميع الحقوق محفوظة</div>

    <!-- Load Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="fingerprint.js"></script>
    <script>
        const SUPABASE_URL = 'https://wnzueymobiwecuikwcgx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InduenVleW1vYml3ZWN1aWt3Y2d4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjk1MjEsImV4cCI6MjA5MTg0NTUyMX0.XYpIYxVLdL_xjQ4oYw0XBC8hHwX6ZCH0E-LpA9evHQI';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        (async function() {
            try {
                // Get current IP and fingerprint
                const fp = await DalalFingerprint.get();
                const geoRes = await fetch('/api/get-ip?fp=' + encodeURIComponent(fp));
                const geo = await geoRes.json();
                const currentIP = geo.ip;

                let blockReason = null;
                let isBlocked = false;

                // Check if IP is blocked
                const { data: ipData } = await db
                    .from('blocked_ips')
                    .select('reason')
                    .eq('ip', currentIP)
                    .limit(1);

                if (ipData && ipData.length > 0) {
                    blockReason = ipData[0].reason;
                    isBlocked = true;
                } else {
                    // Check if fingerprint is blocked
                    const { data: fpData } = await db
                        .from('blocked_fingerprints')
                        .select('reason, blocked_ip_ref')
                        .eq('fingerprint', fp)
                        .limit(1);

                    if (fpData && fpData.length > 0) {
                        blockReason = fpData[0].reason;
                        isBlocked = true;
                        const blockedIPRef = fpData[0].blocked_ip_ref;
                        
                        // Update subtitle for fingerprint block
                        document.getElementById('subtitleText').textContent = 'جهازك محظور من الوصول إلى هذا الموقع.';
                        
                        // If no reason but has blocked_ip_ref, fetch reason from blocked_ips
                        if (!blockReason && blockedIPRef) {
                            const { data: refIPData } = await db
                                .from('blocked_ips')
                                .select('reason')
                                .eq('ip', blockedIPRef)
                                .limit(1);
                            
                            if (refIPData && refIPData.length > 0) {
                                blockReason = refIPData[0].reason;
                            }
                        }
                    }
                }

                // If not blocked, redirect to home
                if (!isBlocked) {
                    window.location.replace('/');
                    return;
                }

                // Display reason (no IP display)
                const reasonText = blockReason || 'بدون سبب';
                document.getElementById('reasonBox').style.display = 'block';
                document.getElementById('reasonText').textContent = reasonText;

            } catch (e) {
                console.error('Error loading block info:', e);
                // On error, redirect to home (safe default)
                window.location.replace('/');
            }
        })();
    </script>
</body>
</html>
