<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>دلال — الموقع تحت الصيانة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/dalal-logo.png">
    <style>
        :root {
            --bg: #0D0D0D;
            --bg-card: #1A1A1A;
            --gold: #E0C097;
            --gold-dim: #C4A67A;
            --text: #F5F0EB;
            --text-muted: #A89B8C;
            --text-dim: #6B6158;
            --border: rgba(224,192,151,0.15);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        .bg-glow::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(224,192,151,0.06) 0%, transparent 70%);
            top: -200px; right: -200px;
            animation: floatGlow 8s ease-in-out infinite;
        }
        .bg-glow::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(224,192,151,0.04) 0%, transparent 70%);
            bottom: -150px; left: -150px;
            animation: floatGlow 10s ease-in-out infinite reverse;
        }
        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem 1.5rem;
            max-width: 520px;
            width: 100%;
            animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo-wrap {
            margin-bottom: 2rem;
        }
        .logo {
            width: 100px;
            height: auto;
            opacity: 0.9;
            filter: drop-shadow(0 4px 20px rgba(224,192,151,0.15));
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 4px 20px rgba(224,192,151,0.15)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 6px 30px rgba(224,192,151,0.25)); }
        }

        /* Gear icon */
        .gear-wrap {
            margin-bottom: 1.5rem;
        }
        .gear-icon {
            color: var(--gold);
            animation: gearSpin 6s linear infinite;
            opacity: 0.7;
        }
        @keyframes gearSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            margin: 1.5rem auto;
        }

        /* Title */
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.08em;
            margin-bottom: 0.75rem;
        }

        /* Message */
        .message {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .sub-message {
            font-size: 0.82rem;
            color: var(--text-dim);
            line-height: 1.7;
        }

        /* Progress dots */
        .dots {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 2rem 0;
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0.3;
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* Social links */
        .socials {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px; height: 42px;
            border-radius: 50%;
            border: 1px solid var(--border);
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .social-link:hover {
            border-color: var(--gold-dim);
            color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(224,192,151,0.15);
        }

        /* Brand footer */
        .brand-footer {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Playfair Display', serif;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            opacity: 0.5;
        }

        @media (max-width: 480px) {
            .title { font-size: 1.3rem; }
            .message { font-size: 0.92rem; }
            .logo { width: 80px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container">
        <div class="logo-wrap">
            <img src="images/dalal-logo.png" alt="DALAL" class="logo">
        </div>

        <div class="gear-wrap">
            <svg class="gear-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </div>

        <div class="divider"></div>

        <h1 class="title" id="maintenanceTitle">الموقع تحت الصيانة</h1>
        <p class="message" id="maintenanceMessage">نعمل حالياً على تحسينات لتجربتك. سنعود قريباً بشكل أجمل!</p>
        <p class="sub-message">شكراً لصبرك وتفهمك 💛</p>

        <div class="dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <div class="socials">
            <a href="https://www.facebook.com/dalal.lingerie/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Facebook">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </a>
            <a href="https://www.instagram.com/dalal.lingerie1/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Instagram">

            </a>
            <a href="https://m.me/dalal.lingerie" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Messenger">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 2C6.477 2 2 6.145 2 11.243c0 2.907 1.434 5.503 3.678 7.199V22l3.38-1.853c.9.25 1.855.384 2.842.384h.1c5.523 0 10-4.145 10-9.243S17.523 2 12 2zm1.076 12.457l-2.55-2.72-4.98 2.72 5.474-5.81 2.613 2.72 4.916-2.72-5.473 5.81z"/></svg>
            </a>
        </div>
    </div>

    <div class="brand-footer">DALAL</div>

    <script>
    // Set language from local storage
    const lang = localStorage.getItem('dalal-lang') || 'ar';
    let defaultMsgAr = 'نعمل حالياً على تحسينات لتجربتك. سنعود قريباً بشكل أجمل!';
    let defaultMsgEn = 'We are currently performing some updates to improve your experience. We will be back soon!';
    
    if (lang === 'en') {
        document.documentElement.lang = 'en';
        document.documentElement.dir = 'ltr';
        document.title = 'DALAL — Under Maintenance';
        document.getElementById('maintenanceTitle').textContent = 'Site Under Maintenance';
        document.getElementById('maintenanceMessage').textContent = defaultMsgEn;
        document.querySelector('.sub-message').textContent = 'Thank you for your patience 💛';
    }

    // Check if maintenance is actually enabled — if not, redirect to home
    (async function() {
        try {
            const res = await fetch('/api/check-maintenance', { signal: AbortSignal.timeout(5000) });
            if (res.ok) {
                const data = await res.json();
                if (!data.maintenance) {
                    window.location.replace('/');
                } else if (data.message) {
                    // Try to guess if it's dual language separated by something, or just show the same
                    document.getElementById('maintenanceMessage').textContent = data.message;
                }
            }
        } catch { /* stay on page */ }
    })();
    </script>
</body>
</html>
